<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho Prático - Cartão Dinâmico</title>
    <meta author="Nome  Luis Fernando C. Carvalho">
    <meta author="Nome Beatriz D. S. Lima">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <div class="painel-editor">
            <h2>Editor de Perfil</h2>
            
            <div class="grupo-input">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="grupo-input">
                <label for="cor">Cor de Fundo:</label>
                <input type="text" id="cor" placeholder="Digite uma cor">
            </div>

            <button id="modo-especial">Modo Especial</button>
        </div>

        <div class="painel-visualizacao">
            <div id="cartao" class="cartao">
                <h3 id="nome-cartao">Nome do Usuário</h3>
                <p class="texto-descricao">Descrição do perfil.</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
